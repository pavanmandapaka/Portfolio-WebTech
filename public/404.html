<!DOCTYPE html>
<html>
<head>
    <title>Pavan's Portfolio</title>
    <script>
        // Single Page App for GitHub Pages redirect handling
        var pathSegmentsToKeep = 1;
        var l = window.location;
        sessionStorage.redirect = l.pathname + l.search + l.hash;
        
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?redirect=' +
            encodeURIComponent(l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')) +
            (l.search ? '&' + l.search.slice(1) : '') +
            l.hash
        );
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
